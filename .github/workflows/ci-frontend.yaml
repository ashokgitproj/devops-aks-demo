name: CI Frontend

on:
  push:
    branches:
      - main
    paths:
      - 'apps/frontend/**'
      - '.github/workflows/ci-frontend.yaml'

permissions:
  id-token: write    # required for OIDC token request
  contents: read

env:
  SERVICE: frontend
  IMAGE_NAME: frontend

jobs:
  build-scan-push:
    name: Build · Scan · Push
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "tag=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Login to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ secrets.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }} \
            apps/${{ env.SERVICE }}

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}'
          format: 'table'
          exit-code: '1'           # fail pipeline on findings
          severity: 'CRITICAL'     # only block on CRITICAL

      - name: Push image to ACR
        run: |
          docker push ${{ secrets.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}

  deploy:
    name: Deploy
    needs: build-scan-push
    uses: ./.github/workflows/cd-deploy.yaml
    with:
      service:   frontend
      image_tag: ${{ needs.build-scan-push.outputs.image_tag }}
    secrets: inherit